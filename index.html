<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mubarak Al-Kabeer HF Registry</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/heart-with-pulse.png">
    <link rel="icon" href="https://img.icons8.com/color/512/heart-with-pulse.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--primary:#8b0000;--primary-dark:#5c0000;--secondary:#6c757d}
        body{background:#f4f6f9;font-family:sans-serif;font-size:0.85rem}
        .clinic-header{background:linear-gradient(135deg,var(--primary),#b30000);color:#fff;padding:25px 0;border-radius:0 0 15px 15px;position:relative}
        .card{border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:20px}
        .section-title{color:var(--primary);font-weight:bold;border-bottom:2px solid #e9ecef;padding-bottom:5px;margin-top:20px;margin-bottom:12px}
        .visit-section{background:#fff;border-left:4px solid var(--primary);padding:15px;margin-bottom:15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        label{font-weight:600;font-size:.75rem;color:#495057;display:block;margin-bottom:2px}
        .form-control,.form-select{border-radius:6px;font-size:.85rem;padding:4px 8px}
        .btn-medical{background:var(--primary);color:#fff;font-weight:bold;width:100%;padding:12px;border:none;border-radius:8px}
        .btn-visit{background:#17a2b8;color:#fff;font-weight:bold}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;justify-content:center;align-items:center}
        .modal-box{background:#fff;border-radius:16px;padding:30px 20px;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:pop .3s ease; max-height:90vh; overflow-y:auto;}
        .page{display:none}.page.active{display:block}
        .patient-card{font-size:0.8rem; margin-bottom:15px;}
        .patient-card th{background:#f8f9fa;width:40%;font-weight:600}
        .clickable-tab{cursor:pointer; padding: 10px; background-color: #e9ecef; border-radius: 5px; border-left: 5px solid var(--primary); transition: 0.2s;}
    </style>
</head>
<body>

<div id="pageMain" class="page active">
    <div class="clinic-header text-center">
        <button class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2" onclick="showAdminLogin()">Admin</button>
        <i class="fa-solid fa-heart-pulse fa-3x mb-1"></i>
        <h2 class="fw-bold mb-0">Mubarak Al-Kabeer Hospital</h2>
        <p class="mb-0">Heart Failure Clinic Registry</p>
    </div>
    
    <div class="container mt-3 mb-5">
        <div class="card p-3 border-top border-4 border-danger shadow">
            <h6 class="text-secondary fw-bold mb-2">Search Patient</h6>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Name, Civil ID, or File No">
                <button class="btn btn-primary px-4" onclick="searchPatient()">Search</button>
            </div>
            <div id="searchResults" class="mt-3"></div>
        </div>

        <div class="card p-3 border-top border-4 border-danger">
            <h4 class="mb-3 text-dark fw-bold" id="formTitle">New Patient Entry</h4>
            <div id="hfForm">
                <h6 class="section-title">1. Demographics</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label class="text-primary">Entered By *</label><select class="form-select" id="Doctor_Name"><option value="">Select...</option><option>Dr Farouk</option><option>Dr Badawy</option><option>Dr Ali</option><option>Dr Hamza</option><option>Dr Ahmed</option></select></div>
                    <div class="col-6 col-md-3"><label>Name *</label><input type="text" class="form-control" id="Patient_Name"></div>
                    <div class="col-6 col-md-3"><label>Civil ID *</label><input type="text" class="form-control" id="Civil_ID" maxlength="12"></div>
                    <div class="col-6 col-md-3"><label>File No *</label><input type="text" class="form-control" id="File_No" maxlength="6"></div>
                    <div class="col-4 col-md-2"><label>Age</label><input type="number" class="form-control" id="Age" oninput="calcMAGGIC(); calcBaselineEGFR();"></div>
                    <div class="col-4 col-md-2"><label>Gender</label><select class="form-select" id="Gender" onchange="calcMAGGIC();"><option value="">Select...</option><option>Male</option><option>Female</option></select></div>
                    <div class="col-4 col-md-4"><label>Nationality</label><input type="text" class="form-control" id="Nationality"></div>
                    <div class="col-12 col-md-4"><label>Mobile</label><input type="tel" class="form-control" id="Mobile"></div>
                </div>

                <h6 class="section-title">2. HF Diagnosis & Status</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label>Type of HF</label><select class="form-select" id="HF_Type"><option value="">Select...</option><option>HFrEF</option><option>HFmrEF</option><option>HFpEF</option></select></div>
                    <div class="col-6 col-md-2"><label>EF (%)</label><input type="number" class="form-control" id="EF_Diagnosis" oninput="calcMAGGIC()"></div>
                    <div class="col-6 col-md-2"><label>Advanced HF</label><select class="form-select" id="Advanced_HF"><option>No</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-5"><label>Other Cardiomyopathies</label><input type="text" class="form-control" id="Other_Cardio"></div>
                    <div class="col-6 col-md-3"><label>Valvular Disease</label><select class="form-select" id="Valvular_Disease"><option>No</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>Admissions Last Yr</label><input type="number" class="form-control" id="Admissions"></div>
                </div>

                <h6 class="section-title">3. Symptoms & Signs</h6>
                <div class="row g-2">
                    <div class="col-4 col-md-2"><label>Height (cm)</label><input type="number" class="form-control" id="Height" oninput="calcBMI()"></div>
                    <div class="col-4 col-md-2"><label>Weight (kg)</label><input type="number" class="form-control" id="Weight" oninput="calcBMI()"></div>
                    <div class="col-4 col-md-2"><label class="text-success">BMI</label><input type="text" class="form-control bg-light" id="BMI" readonly></div>
                    <div class="col-4 col-md-2"><label>NYHA Visit</label><select class="form-select" id="NYHA" onchange="calcMAGGIC()"><option value="">Select...</option><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
                    <div class="col-4 col-md-2"><label>Pulse</label><input type="text" class="form-control" id="Pulse"></div>
                    <div class="col-4 col-md-2"><label>BP</label><input type="text" class="form-control" id="BP" placeholder="120/80" oninput="calcMAGGIC()"></div>
                </div>

                <h6 class="section-title">4. Comorbidities</h6>
                <div class="row g-2">
                    <div class="col-4 col-md-2"><label>DM</label><select class="form-select" id="DM" onchange="calcMAGGIC()"><option>No</option><option>Yes</option></select></div>
                    <div class="col-4 col-md-2"><label>HTN</label><select class="form-select" id="HTN"><option>No</option><option>Yes</option></select></div>
                    <div class="col-4 col-md-2"><label>AF</label><select class="form-select" id="AF"><option>No</option><option>Yes</option></select></div>
                    <div class="col-4 col-md-2"><label>IHD</label><select class="form-select" id="IHD"><option>No</option><option>STEMI</option><option>NSTEMI</option></select></div>
                    <div class="col-4 col-md-2"><label>CKD</label><select class="form-select" id="CKD"><option>No</option><option>Yes</option></select></div>
                    <div class="col-4 col-md-2"><label>Smoker</label><select class="form-select" id="Smoker" onchange="calcMAGGIC()"><option>Never</option><option>Current</option><option>Former</option></select></div>
                    <div class="col-4 col-md-3"><label>Lung Disease</label><select class="form-select" id="Lung_Dz" onchange="calcMAGGIC()"><option>No</option><option>Yes</option></select></div>
                </div>

                <h6 class="section-title">5. Baseline Labs</h6>
                <div class="row g-2">
                    <div class="col-4 col-md-3"><label>Urea/Creat</label><input type="text" class="form-control" id="Lab_UreaCreat" oninput="calcMAGGIC(); calcBaselineEGFR();" placeholder="5/80"></div>
                    <div class="col-4 col-md-3"><label class="text-success">eGFR (Auto)</label><input type="text" class="form-control bg-light" id="Lab_eGFR" readonly></div>
                    <div class="col-4 col-md-3"><label>NT-proBNP</label><input type="text" class="form-control" id="Lab_BNP"></div>
                    <div class="col-4 col-md-3"><label>HbA1c</label><input type="text" class="form-control" id="Lab_HbA1c"></div>
                </div>

                <h6 class="section-title">6. Medications</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label>ARNI</label><select class="form-select" id="Med_ARNI" onchange="calcMAGGIC()"><option>No</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>SGLT2i</label><select class="form-select" id="Med_SGLT2i"><option>None</option><option>Forxiga</option><option>Jardiance</option></select></div>
                    <div class="col-6 col-md-3"><label>B-Blockers</label><select class="form-select" id="Med_BB" onchange="calcMAGGIC()"><option>None</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>ACEi/ARB</label><select class="form-select" id="Med_ACEiARB" onchange="calcMAGGIC()"><option>None</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>MRA</label><select class="form-select" id="Med_MRA"><option>None</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>Diuretics</label><select class="form-select" id="Med_Diuretic"><option>None</option><option>Furosemide</option></select></div>
                </div>

                <h6 class="section-title">7. Outcomes & MAGGIC Score</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label>HF Duration > 18mo</label><select class="form-select" id="HF_Dur" onchange="calcMAGGIC()"><option>No</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label class="text-success fw-bold">MAGGIC Points</label><input type="text" class="form-control bg-light text-success fw-bold" id="MAGGIC_Score" readonly></div>
                    <div class="col-12 col-md-6"><label class="text-danger fw-bold">Est. Mortality (1yr | 3yr)</label><input type="text" class="form-control bg-light text-danger fw-bold" id="MAGGIC_Risk" readonly></div>
                    <div class="col-12"><label>Notes</label><textarea class="form-control" id="Notes" rows="2"></textarea></div>
                </div>

                <h6 class="section-title clickable-tab mt-4" onclick="toggleVisits()">
                    <i id="visitToggleIcon" class="fa fa-plus-circle me-1"></i> 8. Visits & Follow-ups
                </h6>
                <div id="visitsContainer" style="display: none;">
                    <div id="visitHistory" class="mb-3"></div>
                    <div class="visit-section">
                        <div class="row g-2">
                            <div class="col-6"><label>Visit Date</label><input type="date" class="form-control" id="Visit_Date"></div>
                            <div class="col-6"><label>Visit Weight</label><input type="number" class="form-control" id="V_Weight"></div>
                            <div class="col-12 mt-3"><button class="btn btn-visit w-100" onclick="saveVisit()">ADD VISIT</button></div>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn btn-medical mt-4 shadow" id="submitBtn" onclick="savePatient()">SAVE PATIENT DATA</button>
                <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelEditBtn" onclick="resetForm()">Cancel Edit</button>
            </div>
        </div>
    </div>
</div>

<div id="pageAdmin" class="page">
    <div class="clinic-header text-center">
        <button class="btn btn-light btn-sm position-absolute top-0 start-0 m-2" onclick="goToMain()">Back</button>
        <h2 class="fw-bold mb-0">Admin Dashboard</h2>
    </div>
    <div class="container mt-3">
        <div class="card p-2 overflow-auto">
            <table class="table table-sm table-hover text-center">
                <thead class="table-dark"><tr><th>File</th><th>Name</th><th>Action</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="pdfContainer" style="position:absolute; left:-9999px; top:-9999px;"></div>

<script>
// INITIALIZATION
firebase.initializeApp({
    apiKey:"AIzaSyAQ8wAh0gLV7-_lVEXXdIzZ7LmkMnshOiE",
    authDomain:"hf-clinic-registry.firebaseapp.com",
    projectId:"hf-clinic-registry",
    storageBucket:"hf-clinic-registry.firebasestorage.app",
    messagingSenderId:"898458296631",
    appId:"1:898458296631:web:85fea7a2c6661ae0563ab2"
});
const db = firebase.firestore();
let editingDocId = null, currentPatientId = null, PC = {};

// UI FUNCTIONS
function toggleVisits() {
    const container = document.getElementById("visitsContainer");
    const icon = document.getElementById("visitToggleIcon");
    if (container.style.display === "none") {
        container.style.display = "block";
        icon.className = "fa fa-minus-circle me-1";
    } else {
        container.style.display = "none";
        icon.className = "fa fa-plus-circle me-1";
    }
}

function showAdminLogin(){ if(prompt("PIN:")==="1234"){ document.getElementById("pageMain").classList.remove("active"); document.getElementById("pageAdmin").classList.add("active"); loadAdmin(); } }
function goToMain(){ document.getElementById("pageAdmin").classList.remove("active"); document.getElementById("pageMain").classList.add("active"); }

// CALCULATORS
function calcBMI(){
    const w = parseFloat(document.getElementById("Weight").value), h = parseFloat(document.getElementById("Height").value);
    document.getElementById("BMI").value = (w && h) ? (w / ((h / 100) ** 2)).toFixed(1) : "";
}

function calcBaselineEGFR() {
    const age = parseFloat(document.getElementById("Age").value);
    const crStr = document.getElementById("Lab_UreaCreat").value || "";
    const cr = parseFloat(crStr.includes('/') ? crStr.split('/')[1] : crStr);
    if(age && cr) document.getElementById("Lab_eGFR").value = Math.round(186 * Math.pow(cr/88.4, -1.154) * Math.pow(age, -0.203));
}

function calcMAGGIC() {
    let pts = 0;
    const age = parseInt(document.getElementById('Age').value) || 0;
    const ef = parseInt(document.getElementById('EF_Diagnosis').value) || 0;
    const bp = parseInt((document.getElementById('BP').value || "").split('/')[0]) || 120;
    if(age>=70) pts+=4; if(ef<30) pts+=5; if(bp<110) pts+=3;
    if(document.getElementById('DM').value==='Yes') pts+=3;
    if(document.getElementById('NYHA').value==='III') pts+=6;
    if(document.getElementById('HF_Dur').value==='Yes') pts+=2;
    document.getElementById('MAGGIC_Score').value = pts;
    document.getElementById('MAGGIC_Risk').value = pts > 25 ? "High Risk" : "Moderate/Low";
}

// SEARCH & ADMIN
async function searchPatient() {
    const val = document.getElementById("searchInput").value.trim().toLowerCase();
    const res = document.getElementById("searchResults");
    if(!val) return;
    res.innerHTML = "Searching...";
    const snap = await db.collection("patients").get();
    res.innerHTML = `<button class='btn btn-sm btn-dark mb-2' onclick='clearSearch()'>Back</button>`;
    let found = 0;
    snap.forEach(doc => {
        const d = doc.data();
        if((d.Patient_Name||"").toLowerCase().includes(val) || d.Civil_ID === val || d.File_No === val){
            found++; PC[doc.id] = d;
            res.innerHTML += `<div class='card p-3 border-primary mb-2'>
                <b>${d.Patient_Name} (${d.File_No})</b><br>
                <button class='btn btn-sm btn-primary mt-2' onclick='editPt("${doc.id}")'>Edit</button>
                <button class='btn btn-sm btn-danger mt-2' onclick='pdfSync("${doc.id}")'>PDF</button>
            </div>`;
        }
    });
    if(found===0) res.innerHTML = "No results.";
}

function clearSearch(){ document.getElementById("searchInput").value=""; document.getElementById("searchResults").innerHTML=""; }

async function loadAdmin(){
    const tb = document.getElementById("adminTableBody");
    tb.innerHTML = "Loading...";
    const snap = await db.collection("patients").get();
    tb.innerHTML = "";
    snap.forEach(doc => {
        const d = doc.data(); PC[doc.id] = d;
        tb.innerHTML += `<tr><td>${d.File_No}</td><td>${d.Patient_Name}</td><td><button class='btn btn-sm btn-primary' onclick='editPt("${doc.id}")'>Edit</button><button class='btn btn-sm btn-danger' onclick='pdfSync("${doc.id}")'>PDF</button></td></tr>`;
    });
}

// SAVE & EDIT
async function savePatient(){
    const data = {};
    document.querySelectorAll('#hfForm input, #hfForm select, #hfForm textarea').forEach(el => { if(el.id && !el.id.startsWith('V_')) data[el.id] = el.value; });
    if(editingDocId) await db.collection("patients").doc(editingDocId).update(data);
    else { data.timestamp = new Date().toISOString(); await db.collection("patients").add(data); }
    alert("Saved!"); resetForm();
}

function editPt(id){
    const d = PC[id]; editingDocId = id; currentPatientId = id;
    Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; });
    goToMain(); window.scrollTo({top:0, behavior:"smooth"});
}

function resetForm(){ location.reload(); }

// PDF SYNC (THE FIX)
async function pdfSync(id) {
    const data = PC[id];
    const container = document.getElementById('pdfContainer');
    const sections = [
        {name:'Demographics', fields:['Patient_Name', 'Civil_ID', 'File_No', 'Age', 'Gender', 'Nationality', 'Doctor_Name']},
        {name:'HF Status', fields:['HF_Type', 'EF_Diagnosis', 'Advanced_HF', 'Admissions']},
        {name:'Vitals/Symptoms', fields:['Height', 'Weight', 'BMI', 'NYHA', 'BP', 'Pulse']},
        {name:'Comorbidities', fields:['DM', 'HTN', 'AF', 'IHD', 'CKD', 'Smoker', 'Lung_Dz']},
        {name:'Labs & Score', fields:['Lab_UreaCreat', 'Lab_eGFR', 'Lab_BNP', 'MAGGIC_Score', 'MAGGIC_Risk']},
        {name:'Medications', fields:['Med_ARNI', 'Med_SGLT2i', 'Med_BB', 'Med_ACEiARB', 'Med_MRA', 'Med_Diuretic']}
    ];
    
    let html = `<div style='padding:30px; font-family:Arial;'><h2 style='color:#8b0000; text-align:center;'>Mubarak Hospital HF Registry</h2><hr>`;
    sections.forEach(s => {
        html += `<h4 style='background:#f4f4f4; padding:5px;'>${s.name}</h4><table style='width:100%; border-collapse:collapse;'>`;
        s.fields.forEach(f => {
            html += `<tr style='border-bottom:1px solid #eee;'><td style='width:40%; font-weight:bold; padding:4px;'>${f.replace(/_/g,' ')}</td><td style='padding:4px;'>${data[f] || '-'}</td></tr>`;
        });
        html += `</table>`;
    });
    html += `</div>`;
    
    container.innerHTML = html;
    html2pdf().from(container).save(`${data.Patient_Name}_Registry.pdf`);
}
</script>
</body>
</html>
