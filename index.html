<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubarak Al-Kabeer HF Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f4f6f9; font-size: 0.9rem; }
        .clinic-header { background: linear-gradient(135deg, #8b0000 0%, #b30000 100%); color: white; padding: 20px 0; border-radius: 0 0 15px 15px; position: relative; }
        .card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .section-title { color: #8b0000; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 20px; }
        label { font-weight: 600; color: #444; margin-bottom: 2px; display: block; }
        .form-control, .form-select { border-radius: 5px; }
        .btn-medical { background-color: #8b0000; color: white; font-weight: bold; width: 100%; padding: 12px; }
    </style>
</head>
<body>

<div class="clinic-header text-center">
    <button class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2" id="adminBtn">Admin</button>
    <i class="fa-solid fa-heart-pulse fa-3x mb-1"></i>
    <h2 class="mb-0">Mubarak Al-Kabeer Hospital</h2>
    <p class="mb-0">HF Clinic Registry</p>
</div>

<div class="container mt-3 mb-5">
    <div id="adminPanel" class="card border-dark d-none shadow-lg">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <span>Registry Database (<span id="totalPatients">0</span>)</span>
            <button class="btn btn-sm btn-danger" id="closeAdminBtn">X</button>
        </div>
        <div class="card-body overflow-auto" style="max-height: 400px;">
            <table class="table table-sm table-hover text-center">
                <thead><tr><th>File</th><th>Name</th><th>Doctor</th><th>Action</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card p-3 border-danger border-top">
        <label>Search Patient</label>
        <div class="input-group">
            <input type="text" id="searchInput" class="form-control" placeholder="Civil ID or File No">
            <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
        <div id="searchResults" class="mt-3"></div>
    </div>

    <div class="card p-3">
        <h4 id="formTitle" class="text-danger fw-bold">New Entry</h4>
        <form id="hfForm">
            <h6 class="section-title">1. Demographics</h6>
            <div class="row g-2">
                <div class="col-6"><label>Doctor *</label><select id="Doctor_Name" class="form-select border-primary" required><option value="">Select...</option><option>Dr Farouk</option><option>Dr Badawy</option><option>Dr Ali</option><option>Dr Hamza</option><option>Dr Ahmed</option></select></div>
                <div class="col-6"><label>Patient Name *</label><input type="text" id="Name" class="form-control" required></div>
                <div class="col-6"><label>Civil ID *</label><input type="number" id="Civil_ID" class="form-control" required></div>
                <div class="col-6"><label>File No *</label><input type="number" id="File_No" class="form-control" required></div>
            </div>

            <h6 class="section-title">2. Signs & BMI</h6>
            <div class="row g-2">
                <div class="col-4"><label>Height (cm)</label><input type="number" id="Height" class="form-control"></div>
                <div class="col-4"><label>Weight (kg)</label><input type="number" id="Weight" class="form-control"></div>
                <div class="col-4"><label>BMI (Auto)</label><input type="text" id="BMI" class="form-control bg-light" readonly></div>
                <div class="col-4"><label>Pulse</label><input type="text" id="Pulse" class="form-control"></div>
                <div class="col-4"><label>BP</label><input type="text" id="BP" class="form-control"></div>
                <div class="col-4"><label>SpO2</label><input type="number" id="SpO2" class="form-control"></div>
            </div>

            <h6 class="section-title">3. Medications & Labs</h6>
            <div class="row g-2">
                <div class="col-6"><label>HF Type</label><select id="HF_Type" class="form-select"><option>HFrEF</option><option>HFmrEF</option><option>HFpEF</option></select></div>
                <div class="col-6"><label>EF (%)</label><input type="number" id="EF" class="form-control"></div>
                <div class="col-6"><label>Lipids</label><select id="Lipids" class="form-select"><option>None</option><option>Zocor</option><option>Lipitor</option><option>Crestor</option><option>Repatha</option></select></div>
                <div class="col-6"><label>Antiplatelet</label><select id="Antiplatelet" class="form-select"><option>None</option><option>ASA</option><option>Plavix</option><option>Brilinta</option></select></div>
            </div>

            <button type="submit" class="btn btn-medical mt-4 shadow" id="submitBtn">SAVE DATA</button>
            <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelEditBtn">Cancel Edit</button>
        </form>
    </div>
</div>

<div id="pdf-box" style="display:none; padding:20px;"></div>
<script type="module" src="app.js"></script>
</body>
</html>
