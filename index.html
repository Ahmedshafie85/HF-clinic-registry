<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mubarak Al-Kabeer HF Registry</title>
    <!-- PWA -->
    <link rel="manifest" href="data:application/manifest+json,{}" id="manifest">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%238b0000'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E❤️%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#8b0000">
    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #8b0000;
            --primary-dark: #5c0000;
            --secondary: #6c757d;
        }
        body {
            background: #f4f6f9;
            font-family: sans-serif;
            font-size: 0.85rem;
        }
        .clinic-header {
            background: linear-gradient(135deg, var(--primary), #b30000);
            color: #fff;
            padding: 20px 0;
            border-radius: 0 0 15px 15px;
            position: relative;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
            margin-bottom: 20px;
        }
        .section-title {
            color: var(--primary);
            font-weight: bold;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 5px;
            margin-top: 20px;
            margin-bottom: 12px;
        }
        .visit-section {
            background: #fff;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            font-weight: 600;
            font-size: .75rem;
            color: #495057;
            display: block;
            margin-bottom: 2px;
        }
        .form-control, .form-select {
            border-radius: 6px;
            font-size: .85rem;
            padding: 4px 8px;
        }
        .btn-medical {
            background: var(--primary);
            color: #fff;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
        }
        .btn-visit {
            background: #17a2b8;
            color: #fff;
            font-weight: bold;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: pop .3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes pop {
            from { transform: scale(.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .page { display: none; }
        .page.active { display: block; }
        .loading { opacity: 0.6; pointer-events: none; }
        .patient-card {
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .patient-card th {
            background: #f8f9fa;
            width: 40%;
            font-weight: 600;
        }
        .patient-card td {
            background: #fff;
        }
        .empty-field {
            color: #adb5bd;
            font-style: italic;
        }
        .visit-history {
            border-left: 3px solid #17a2b8;
            padding-left: 10px;
            margin: 10px 0;
        }
        .input-error {
            border: 2px solid #dc3545 !important;
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.7rem;
            display: none;
        }
        .chart-container {
            position: relative;
            height: 22vh;
            width: 100%;
            margin-bottom: 15px;
        }
        .clickable-tab {
            cursor: pointer;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
            border-left: 5px solid var(--primary);
            transition: 0.2s;
        }
        .clickable-tab:hover {
            background-color: #dee2e6;
        }
        #pdfContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            overflow: auto;
            z-index: 99998;
            background: #fff;
            display: none;
        }
        #pdfContainer.active {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="pageMain" class="page active">
    <div class="clinic-header text-center">
        <button class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2" onclick="app.showAdmin()">Admin</button>
        <i class="fa-solid fa-heart-pulse fa-3x mb-1"></i>
        <h2 class="fw-bold mb-0">Mubarak Al-Kabeer Hospital</h2>
        <p class="mb-0">Heart Failure Clinic Registry</p>
    </div>
    <div class="container mt-3 mb-5">
        <!-- Search -->
        <div class="card p-3 border-top border-4 border-danger shadow">
            <h6 class="text-secondary fw-bold mb-2">Search Patient</h6>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Name, Civil ID, or File No">
                <button class="btn btn-primary px-4" id="searchBtn">Search</button>
            </div>
            <div id="searchResults" class="mt-3"></div>
        </div>

        <!-- Patient Form -->
        <div class="card p-3 border-top border-4 border-danger">
            <h4 class="mb-3 text-dark fw-bold" id="formTitle">New Patient Entry</h4>
            <div id="hfForm"></div>
            <hr class="mt-4 border-danger">
            <button type="button" class="btn btn-medical shadow" id="submitBtn">SAVE PATIENT DATA</button>
            <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelEditBtn">Cancel Edit</button>
        </div>
    </div>
</div>

<div id="pageAdmin" class="page">
    <div class="clinic-header text-center">
        <button class="btn btn-light btn-sm position-absolute top-0 start-0 m-2" onclick="app.goToMain()">Back</button>
        <h2 class="fw-bold mb-0">Admin Dashboard</h2>
        <p class="mb-0">Total Registry: <span id="totalPatients">0</span> Patients</p>
    </div>
    <div class="container mt-3">
        <div class="card p-3 border-top border-4 border-warning shadow-sm mb-3">
            <h6 class="text-warning fw-bold mb-2"><i class="fa fa-clock"></i> Upcoming Follow-ups (Next 14 Days)</h6>
            <div id="upcomingAppts" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <div class="card p-2 overflow-auto" style="max-height:60vh;">
            <table class="table table-sm table-hover text-center align-middle">
                <thead class="table-dark">*
                    <th>File</th><th>Name</th><th>Doctor</th><th>Action</th>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="chartModal" class="modal-overlay d-none">
    <div class="modal-box" style="text-align:left; max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
            <h5 class="m-0 text-primary fw-bold"><i class="fa fa-chart-line"></i> Patient Trends</h5>
            <button class="btn-close" id="closeChartModal"></button>
        </div>
        <div class="chart-container"><canvas id="weightChart"></canvas></div>
        <div class="chart-container"><canvas id="ntproChart"></canvas></div>
        <div class="chart-container"><canvas id="bnpChart"></canvas></div>
    </div>
</div>

<div id="pdfContainer"></div>

<script>
// Firebase Config (same as original, but no authentication)
const firebaseConfig = {
    apiKey: "AIzaSyAQ8wAh0gLV7-_lVEXXdIzZ7LmkMnshOiE",
    authDomain: "hf-clinic-registry.firebaseapp.com",
    projectId: "hf-clinic-registry",
    storageBucket: "hf-clinic-registry.firebasestorage.app",
    messagingSenderId: "898458296631",
    appId: "1:898458296631:web:85fea7a2c6661ae0563ab2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Application Namespace
const app = {
    currentPatientId: null,
    editingDocId: null,
    visits: [],
    charts: { weight: null, ntpro: null, bnp: null },
    formFieldsConfig: null,
    patientDataCache: {},

    // ---------- UI Helpers ----------
    showPopup: function(type, title, msg) {
        const old = document.getElementById('popOv');
        if(old) old.remove();
        const color = type === "success" ? "#28a745" : type === "error" ? "#dc3545" : "#ffc107";
        const icon = type === "success" ? "fa-check-circle" : type === "error" ? "fa-exclamation-triangle" : "fa-info-circle";
        const ov = document.createElement('div');
        ov.id = 'popOv';
        ov.className = 'modal-overlay';
        ov.innerHTML = `<div class="modal-box">
            <div class="text-center"><i class="fa-solid ${icon} fa-3x" style="color:${color}"></i></div>
            <h4 style="color:${color}" class="text-center mt-2">${title}</h4>
            <p class="text-muted text-center">${msg}</p>
            <button class="btn btn-dark w-100" onclick="this.parentElement.parentElement.remove()">OK</button>
        </div>`;
        document.body.appendChild(ov);
    },

    showLoading: function(btn, text) {
        btn.disabled = true;
        btn.innerHTML = `<span class="loading-spinner"></span> ${text}`;
        btn.classList.add('loading');
    },
    hideLoading: function(btn, originalText) {
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.classList.remove('loading');
    },

    // ---------- Form Generation (dynamic, includes all original fields) ----------
    buildForm: function() {
        const container = document.getElementById('hfForm');
        const sections = this.formFieldsConfig;
        let html = '';
        for (const [sectionName, fields] of Object.entries(sections)) {
            html += `<h6 class="section-title">${sectionName}</h6><div class="row g-2">`;
            for (const field of fields) {
                const { id, label, type, options, placeholder, readonly, className } = field;
                let inputHtml = '';
                if (type === 'select') {
                    let opts = '';
                    for (const opt of options) {
                        opts += `<option value="${opt}">${opt}</option>`;
                    }
                    inputHtml = `<select class="form-select ${className || ''}" id="${id}">${opts}</select>`;
                } else if (type === 'textarea') {
                    inputHtml = `<textarea class="form-control ${className || ''}" id="${id}" rows="2" placeholder="${placeholder || ''}"></textarea>`;
                } else {
                    inputHtml = `<input type="${type}" class="form-control ${className || ''}" id="${id}" placeholder="${placeholder || ''}" ${readonly ? 'readonly' : ''}>`;
                }
                html += `<div class="col-${field.cols || 3}"><label>${label}</label>${inputHtml}</div>`;
            }
            html += `</div>`;
        }
        // Add visits section
        html += `
            <h6 class="section-title clickable-tab text-primary mt-4" onclick="app.toggleVisits()">
                <i id="visitToggleIcon" class="fa fa-plus-circle me-1"></i> 9. Visits & Follow-ups <span class="text-muted fw-normal" style="font-size:0.75rem;">(Click to expand)</span>
            </h6>
            <div id="visitsContainer" style="display: none;">
                <div id="visitHistory" class="mb-3"></div>
                <div class="visit-section">
                    <h6 class="text-primary mb-3">Add New Visit</h6>
                    <div class="row g-2">
                        <div class="col-6 col-md-3"><label>Visit Date *</label><input type="date" class="form-control" id="Visit_Date"></div>
                        <div class="col-6 col-md-3"><label>Visit Type</label><select class="form-select" id="Visit_Type"><option>Routine</option><option>Urgent</option><option>Post-Discharge</option><option>Telemedicine</option></select></div>
                        <div class="col-12"><hr></div>
                        <div id="visitDynamicFields"></div>
                        <div class="col-12 mt-3">
                            <button type="button" class="btn btn-visit w-100" onclick="app.saveVisit()"><i class="fa fa-plus-circle"></i> ADD VISIT TO PATIENT RECORD</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;
        this.generateVisitFields();
        this.attachCalculationEvents();
    },

    generateVisitFields: function() {
        // Include all original visit fields (medications, labs, etc.) for completeness.
        // For brevity, we'll embed a representative subset; you can expand if needed.
        const container = document.getElementById('visitDynamicFields');
        if (!container) return;
        container.innerHTML = `
            <div class="row g-2">
                <div class="col-4 col-md-2"><label>Fatigue</label><select class="form-select" id="V_Fatigue"><option>N</option><option>Y</option></select></div>
                <div class="col-4 col-md-2"><label>NYHA Class</label><select class="form-select" id="V_NYHA"><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
                <div class="col-4 col-md-3"><label>Edema</label><select class="form-select" id="V_Edema"><option>No</option><option>Mild feet</option><option>Moderate</option><option>Severe</option></select></div>
                <div class="col-4 col-md-2"><label>Pulse</label><input type="text" class="form-control" id="V_Pulse"></div>
                <div class="col-4 col-md-2"><label>BP</label><input type="text" class="form-control" id="V_BP"></div>
                <div class="col-4 col-md-2"><label>SpO2 %</label><input type="number" class="form-control" id="V_SpO2"></div>
                <div class="col-4 col-md-2"><label>Weight (kg)</label><input type="number" class="form-control" id="V_Weight"></div>
                <div class="col-4 col-md-2"><label>Creat (µmol/L)</label><input type="text" class="form-control" id="V_Creat" oninput="app.calcEGFRVisit()"></div>
                <div class="col-4 col-md-2"><label class="text-success">eGFR (Auto)</label><input type="text" class="form-control bg-light" id="V_eGFR" readonly></div>
                <div class="col-4 col-md-2"><label>BNP</label><input type="text" class="form-control" id="V_BNP"></div>
                <div class="col-4 col-md-2"><label>NT-proBNP</label><input type="text" class="form-control" id="V_NTproBNP"></div>
                <div class="col-12 col-md-6"><label>Plan / Recommendations</label><textarea class="form-control" id="V_Plan" rows="2"></textarea></div>
                <div class="col-12 col-md-4"><label>Next Appointment</label><input type="date" class="form-control" id="Next_Appt"></div>
            </div>
        `;
    },

    attachCalculationEvents: function() {
        const fields = ['Age', 'EF_Diagnosis', 'BP', 'BMI', 'Lab_UreaCreat', 'NYHA', 'Gender', 'Smoker', 'DM', 'Lung_Dz', 'HF_Dur', 'Med_BB', 'Med_ACEiARB', 'Med_ARNI'];
        fields.forEach(f => {
            const el = document.getElementById(f);
            if (el) {
                el.addEventListener('change', () => app.calcMAGGIC());
                if (el.tagName !== 'SELECT') el.addEventListener('input', () => app.calcMAGGIC());
            }
        });
        const weight = document.getElementById('Weight');
        const height = document.getElementById('Height');
        if (weight && height) {
            weight.addEventListener('input', () => app.calcBMI());
            height.addEventListener('input', () => app.calcBMI());
        }
        const ureaCreat = document.getElementById('Lab_UreaCreat');
        if (ureaCreat) ureaCreat.addEventListener('input', () => app.calcBaselineEGFR());
    },

    calcBMI: function() {
        const w = parseFloat(document.getElementById("Weight")?.value);
        const h = parseFloat(document.getElementById("Height")?.value);
        const bmiField = document.getElementById("BMI");
        if (w && h && h>0) bmiField.value = (w / ((h/100)**2)).toFixed(1);
        else bmiField.value = "";
        this.calcMAGGIC();
    },

    calcBaselineEGFR: function() {
        const age = parseFloat(document.getElementById("Age")?.value);
        const gender = document.getElementById("Gender")?.value;
        const input = document.getElementById("Lab_UreaCreat")?.value || "";
        const creatStr = input.includes('/') ? input.split('/')[1] : input;
        const creat = parseFloat(creatStr);
        const eGfrField = document.getElementById("Lab_eGFR");
        if (!age || !gender || !creat || isNaN(creat)) { eGfrField.value = ""; return; }
        const cr_mgdl = creat / 88.4;
        const kappa = gender === "Female" ? 0.7 : 0.9;
        let alpha = gender === "Female" ? -0.244 : -0.302;
        if (cr_mgdl > kappa) alpha = -1.200;
        const multiplier = gender === "Female" ? 1.012 : 1;
        const eGFR = Math.round(142 * Math.pow(cr_mgdl / kappa, alpha) * Math.pow(0.9938, age) * multiplier);
        eGfrField.value = eGFR;
        this.calcMAGGIC();
    },

    calcEGFRVisit: function() {
        const age = parseFloat(document.getElementById("Age")?.value);
        const gender = document.getElementById("Gender")?.value;
        const creat = parseFloat(document.getElementById("V_Creat")?.value);
        const eGfrField = document.getElementById("V_eGFR");
        if (!age || !gender || !creat || isNaN(creat)) { eGfrField.value = ""; return; }
        const cr_mgdl = creat / 88.4;
        const kappa = gender === "Female" ? 0.7 : 0.9;
        let alpha = gender === "Female" ? -0.244 : -0.302;
        if (cr_mgdl > kappa) alpha = -1.200;
        const multiplier = gender === "Female" ? 1.012 : 1;
        eGfrField.value = Math.round(142 * Math.pow(cr_mgdl / kappa, alpha) * Math.pow(0.9938, age) * multiplier);
    },

    calcMAGGIC: function() {
        let pts = 0;
        // Age
        const age = parseInt(document.getElementById('Age')?.value) || 0;
        if (age>=85) pts+=7; else if (age>=80) pts+=6; else if (age>=75) pts+=5; else if (age>=70) pts+=4; else if (age>=65) pts+=3; else if (age>=60) pts+=2; else if (age>=55) pts+=1;
        // EF
        const ef = parseInt(document.getElementById('EF_Diagnosis')?.value) || 0;
        if (ef>0) { if (ef<20) pts+=7; else if (ef<25) pts+=6; else if (ef<30) pts+=5; else if (ef<35) pts+=3; else if (ef<40) pts+=2; }
        // SBP
        const bpStr = document.getElementById('BP')?.value || "";
        const sysBP = parseInt(bpStr.split('/')[0]) || 0;
        if (sysBP>0) { if (sysBP<110) pts+=5; else if (sysBP<120) pts+=4; else if (sysBP<130) pts+=3; else if (sysBP<140) pts+=2; else if (sysBP<150) pts+=1; }
        // BMI
        const bmi = parseFloat(document.getElementById('BMI')?.value) || 0;
        if (bmi>0) { if (bmi<15) pts+=6; else if (bmi<20) pts+=5; else if (bmi<25) pts+=3; else if (bmi<30) pts+=2; }
        // Creatinine (in mg/dL)
        const crStr = document.getElementById('Lab_UreaCreat')?.value || "";
        let creat = parseFloat(crStr.includes('/') ? crStr.split('/')[1] : crStr) || 0;
        let creatMgdl = creat / 88.4;
        if (creatMgdl >= 2.8) pts += 8;
        else if (creatMgdl >= 2.4) pts += 6;
        else if (creatMgdl >= 2.0) pts += 5;
        else if (creatMgdl >= 1.7) pts += 4;
        else if (creatMgdl >= 1.5) pts += 3;
        else if (creatMgdl >= 1.3) pts += 2;
        else if (creatMgdl >= 1.0) pts += 1;
        // NYHA
        const nyha = document.getElementById('NYHA')?.value;
        if (nyha==='II') pts+=2; else if (nyha==='III') pts+=6; else if (nyha==='IV') pts+=8;
        // Others
        if (document.getElementById('Gender')?.value === 'Male') pts+=1;
        if (document.getElementById('Smoker')?.value === 'Current') pts+=1;
        if (document.getElementById('DM')?.value === 'Yes') pts+=3;
        if (document.getElementById('Lung_Dz')?.value === 'Yes') pts+=2;
        if (document.getElementById('HF_Dur')?.value === 'Yes') pts+=2;
        // Medications
        const bb = document.getElementById('Med_BB')?.value;
        if (!bb || bb === 'None') pts+=3;
        const ace = document.getElementById('Med_ACEiARB')?.value;
        const arni = document.getElementById('Med_ARNI')?.value;
        if ((!ace || ace === 'None') && (!arni || arni === 'No')) pts+=1;

        // Risk interpretation
        let risk1 = "<5%", risk3 = "<10%";
        if (pts>35) { risk1 = ">40%"; risk3 = ">70%"; }
        else if (pts>30) { risk1 = "~30%"; risk3 = "~60%"; }
        else if (pts>25) { risk1 = "~20%"; risk3 = "~45%"; }
        else if (pts>20) { risk1 = "~10%"; risk3 = "~25%"; }
        else if (pts>15) { risk1 = "~6%"; risk3 = "~15%"; }

        document.getElementById('MAGGIC_Score').value = pts;
        document.getElementById('MAGGIC_Risk').value = `${risk1} | ${risk3}`;
    },

    // ---------- Save / Update with Uniqueness ----------
    savePatient: async function() {
        const civilID = document.getElementById("Civil_ID")?.value.trim();
        const fileNo = document.getElementById("File_No")?.value.trim();
        if (civilID.length !== 12) { this.showPopup("error", "Invalid Civil ID", "Must be exactly 12 digits"); return; }
        if (fileNo.length !== 6) { this.showPopup("error", "Invalid File No", "Must be exactly 6 digits"); return; }

        const data = {};
        document.querySelectorAll('#hfForm input, #hfForm select, #hfForm textarea').forEach(el => {
            if (el.id && !el.id.startsWith('V_') && el.id !== 'Next_Appt') data[el.id] = el.value;
        });
        if (!data.Doctor_Name || !data.Patient_Name) {
            this.showPopup("error", "Missing Fields", "Please fill Name, Doctor Name, Civil ID and File No.");
            return;
        }
        data.Patient_Name_lower = data.Patient_Name.toLowerCase();

        const btn = document.getElementById("submitBtn");
        const originalText = btn.innerText;
        this.showLoading(btn, "Saving...");

        try {
            // Check uniqueness
            let existing = await db.collection("patients").where("Civil_ID", "==", civilID).get();
            if (!existing.empty && (this.editingDocId !== existing.docs[0].id)) {
                this.showPopup("error", "Duplicate Civil ID", "Another patient has this Civil ID.");
                this.hideLoading(btn, originalText);
                return;
            }
            existing = await db.collection("patients").where("File_No", "==", fileNo).get();
            if (!existing.empty && (this.editingDocId !== existing.docs[0].id)) {
                this.showPopup("error", "Duplicate File No", "Another patient has this File Number.");
                this.hideLoading(btn, originalText);
                return;
            }

            if (this.editingDocId) {
                await db.collection("patients").doc(this.editingDocId).update(data);
                this.showPopup("success", "Updated!", "Patient record updated.");
            } else {
                data.timestamp = new Date().toISOString();
                const docRef = await db.collection("patients").add(data);
                this.currentPatientId = docRef.id;
                this.showPopup("success", "Saved!", "New patient added.");
            }
            this.resetForm();
        } catch (err) {
            this.showPopup("error", "Error", err.message);
        } finally {
            this.hideLoading(btn, originalText);
        }
    },

    // ---------- Visit Handling ----------
    saveVisit: async function() {
        if (!this.currentPatientId && !this.editingDocId) {
            this.showPopup("error", "Error", "Please save patient data first before adding visits.");
            return;
        }
        const patientId = this.currentPatientId || this.editingDocId;
        const visitDate = document.getElementById("Visit_Date").value;
        if (!visitDate) { this.showPopup("error", "Error", "Please enter visit date."); return; }

        const visitData = {};
        document.querySelectorAll('[id^="V_"]').forEach(el => { if (el.id) visitData[el.id] = el.value; });
        visitData.visitDate = visitDate;
        visitData.visitType = document.getElementById("Visit_Type").value;
        visitData.timestamp = new Date().toISOString();

        try {
            await db.collection("patients").doc(patientId).collection("visits").add(visitData);
            const nextAppt = document.getElementById("Next_Appt").value;
            if (nextAppt) await db.collection("patients").doc(patientId).update({ Next_Appt: nextAppt });
            this.showPopup("success", "Visit Added!", "Follow-up visit saved.");
            this.clearVisitForm();
            this.loadVisits(patientId);
        } catch(err) {
            this.showPopup("error", "Error", err.message);
        }
    },

    clearVisitForm: function() {
        document.querySelectorAll('[id^="V_"]').forEach(el => el.value = "");
        document.getElementById("Visit_Date").value = "";
        document.getElementById("Next_Appt").value = "";
        document.getElementById("Visit_Type").value = "Routine";
    },

    loadVisits: async function(patientId) {
        if (!patientId) return;
        this.currentPatientId = patientId;
        const snapshot = await db.collection("patients").doc(patientId).collection("visits").orderBy("visitDate", "desc").get();
        let html = "";
        if (snapshot.size > 0) {
            html = "<div class='alert alert-info'><h6>Previous Visits:</h6>";
            snapshot.forEach(doc => {
                const v = doc.data();
                html += `<div class='visit-history'><strong>${v.visitDate}</strong> (${v.visitType})<br>`;
                html += `<small>NYHA: ${v.V_NYHA || '-'}, BP: ${v.V_BP || '-'}, Weight: ${v.V_Weight || '-'}kg</small></div>`;
            });
            html += "</div>";
        }
        document.getElementById("visitHistory").innerHTML = html;
    },

    // ---------- Search (Firestore Queries) ----------
    searchPatient: async function() {
        const val = document.getElementById("searchInput").value.trim().toLowerCase();
        const resultsDiv = document.getElementById("searchResults");
        if (!val) { resultsDiv.innerHTML = ""; return; }
        resultsDiv.innerHTML = "<div class='text-center'><i class='fa fa-spinner fa-spin'></i> Searching...</div>";
        try {
            let found = false;
            let html = "<div class='mb-2'><button class='btn btn-sm btn-outline-dark' onclick='app.clearSearch()'><i class='fa fa-arrow-left'></i> Back to Search</button></div>";

            // Exact match on Civil ID or File No
            let q = await db.collection("patients").where("Civil_ID", "==", val).limit(10).get();
            if (q.empty) q = await db.collection("patients").where("File_No", "==", val).limit(10).get();
            if (!q.empty) {
                found = true;
                q.forEach(doc => {
                    const data = doc.data();
                    this.patientDataCache[doc.id] = data;
                    html += this.generatePatientCard(data, doc.id);
                });
            } else {
                // Search by name (case-insensitive)
                const nameQuery = await db.collection("patients").where("Patient_Name_lower", ">=", val)
                    .where("Patient_Name_lower", "<=", val + '\uf8ff').limit(10).get();
                if (!nameQuery.empty) {
                    found = true;
                    nameQuery.forEach(doc => {
                        const data = doc.data();
                        this.patientDataCache[doc.id] = data;
                        html += this.generatePatientCard(data, doc.id);
                    });
                }
            }

            if (!found) {
                html = "<div class='alert alert-warning'>No patient found. <button class='btn btn-sm btn-outline-dark ms-2' onclick='app.clearSearch()'>Back</button></div>";
            }
            resultsDiv.innerHTML = html;
        } catch(err) {
            resultsDiv.innerHTML = `<div class='alert alert-danger'>Error: ${err.message}</div>`;
        }
    },

        return `
            <div class="card p-2 mb-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div><strong>${escapeHtml(data.Patient_Name || 'Unknown')}</strong> (File: ${data.File_No || '-'})</div>

                        <button class="btn btn-sm btn-primary" onclick="app.editPatient('${id}')">Edit</button>

    // ---------- Admin Dashboard ----------
    loadAdmin: async function() {
        const tb = document.getElementById("adminTableBody");
        tb.innerHTML = `<tr><td colspan="4" class="text-center"><i class="fa fa-spinner fa-spin"></i> Loading...</td></tr>`;
        try {
            const snap = await db.collection("patients").orderBy("timestamp", "desc").get();
            document.getElementById("totalPatients").innerText = snap.size;
            if (snap.size === 0) { tb.innerHTML = "<tr><td colspan='4'>No patients yet</td></tr>"; return; }

            let upcomingHTML = "";
            const today = new Date().toISOString().slice(0,10);
            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                this.patientDataCache[id] = d;
                if (d.Next_Appt && d.Next_Appt >= today) {
                    const days = Math.floor((new Date(d.Next_Appt) - new Date(today)) / (1000*3600*24));
                    if (days <= 14) {
                        const color = days <= 3 ? "danger" : (days <= 7 ? "warning" : "info");
                        upcomingHTML += `<div class="alert alert-${color} py-1 px-2 mb-1 d-flex justify-content-between"><span><b>${escapeHtml(d.Patient_Name || '')}</b> (${d.File_No || ''})</span><span><i class="fa fa-calendar"></i> ${d.Next_Appt} (in ${days} days)</span></div>`;
                    }
                }
                tb.innerHTML += `
                    <tr>
                        <td>${escapeHtml(d.File_No || '')}</td>
                        <td>${escapeHtml(d.Patient_Name || '')}</td>
                        <td>${escapeHtml(d.Doctor_Name || '')}</td>
                        <td>
                            <button class="btn btn-sm btn-primary me-1" onclick="app.editFromAdmin('${id}')">Edit</button>
                            <button class="btn btn-sm btn-info text-white me-1" onclick="app.pdfFromAdmin('${id}')">PDF</button>
                            <button class="btn btn-sm btn-success me-1" onclick="app.exportPatientExcel('${id}')">Excel</button>
                            <button class="btn btn-sm btn-danger" onclick="app.deletePatient('${id}')">Del</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById("upcomingAppts").innerHTML = upcomingHTML || "<p class='text-muted small mb-0'>No appointments in the next 14 days.</p>";
        } catch(err) {
            tb.innerHTML = `<tr><td colspan="4" class="text-danger">Error loading data</td></tr>`;
        }
    },

    editFromAdmin: function(id) {
        this.editPatient(id);
        this.goToMain();
    },

    editPatient: function(id) {
        const data = this.patientDataCache[id];
        if (!data) return;
        this.editingDocId = id;
        this.currentPatientId = id;
        for (const [k, v] of Object.entries(data)) {
            const el = document.getElementById(k);
            if (el) el.value = v;
        }
        document.getElementById("formTitle").innerText = "Editing: " + (data.Patient_Name || '');
        document.getElementById("cancelEditBtn").classList.remove("d-none");
        document.getElementById("submitBtn").innerText = "Update Patient";
        this.loadVisits(id);
        const container = document.getElementById("visitsContainer");
        if (container) container.style.display = "block";
        const icon = document.getElementById("visitToggleIcon");
        if (icon) icon.className = "fa fa-minus-circle me-1";
        window.scrollTo({ top: 0, behavior: "smooth" });
    },

    deletePatient: async function(id) {
        if (confirm("Permanently delete this patient record?")) {
            await db.collection("patients").doc(id).delete();
            this.loadAdmin();
        }
    },

    resetForm: function() {
        document.querySelectorAll('#hfForm input, #hfForm select, #hfForm textarea').forEach(el => {
            if (el.id && !el.id.startsWith('V_')) el.value = "";
        });
        document.getElementById("searchInput").value = "";
        document.getElementById("searchResults").innerHTML = "";
        this.editingDocId = null;
        this.currentPatientId = null;
        document.getElementById("visitHistory").innerHTML = "";
        document.getElementById("visitsContainer").style.display = "none";
        document.getElementById("visitToggleIcon").className = "fa fa-plus-circle me-1";
        document.getElementById("submitBtn").innerText = "SAVE PATIENT DATA";
        document.getElementById("cancelEditBtn").classList.add("d-none");
        document.getElementById("formTitle").innerText = "New Patient Entry";
        document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

    toggleVisits: function() {
        const container = document.getElementById("visitsContainer");
        const icon = document.getElementById("visitToggleIcon");
        if (container.style.display === "none" || container.style.display === "") {
            container.style.display = "block";

        } else {

    // ---------- Charts ----------
    showTrends: async function(patientId) {
        document.getElementById("chartModal").classList.remove("d-none");
        const snap = await db.collection("patients").doc(patientId).collection("visits").orderBy("visitDate", "asc").get();
        const dates = [], weights = [], bnps = [], ntpros = [];
        snap.forEach(doc => {
            const v = doc.data();
            dates.push(v.visitDate);
            weights.push(parseFloat(v.V_Weight) || null);
            bnps.push(parseFloat(v.V_BNP) || null);
            ntpros.push(parseFloat(v.V_NTproBNP) || null);
        });
        if (dates.length === 0) {
            this.showPopup("warning", "No Data", "No visits recorded.");
            document.getElementById("chartModal").classList.add("d-none");
            return;
        }
        if (this.charts.weight) this.charts.weight.destroy();
        if (this.charts.bnp) this.charts.bnp.destroy();
        if (this.charts.ntpro) this.charts.ntpro.destroy();

        const options = { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { font: { size: 10 } } } } };
        this.charts.weight = new Chart(document.getElementById('weightChart'), {
            type: 'line', data: { labels: dates, datasets: [{ label: 'Weight (kg)', data: weights, borderColor: '#17a2b8' }] }, options
        });
        this.charts.bnp = new Chart(document.getElementById('bnpChart'), {
            type: 'line', data: { labels: dates, datasets: [{ label: 'BNP', data: bnps, borderColor: '#ffc107' }] }, options
        });
        this.charts.ntpro = new Chart(document.getElementById('ntproChart'), {
            type: 'line', data: { labels: dates, datasets: [{ label: 'NT-proBNP', data: ntpros, borderColor: '#dc3545' }] }, options
        });
    },

    // ---------- PDF & Excel (simplified, but functional) ----------
    pdfFromAdmin: async function(id) {
        const data = this.patientDataCache[id];
        if (!data) { this.showPopup("error","Error","Patient data not found"); return; }
        const snap = await db.collection("patients").doc(id).collection("visits").orderBy("visitDate","desc").get();
        const visits = []; snap.forEach(d => visits.push(d.data()));
        this.generatePDF(data, visits, id);
    },

    generatePDF: function(data, visits, id) {
        const container = document.getElementById('pdfContainer');
        container.innerHTML = '';
        container.classList.add('active');
        let html = `<div id='pdfContent' style='width:750px; margin:0 auto; background:#fff; padding:20px; font-family:Arial,Helvetica,sans-serif;'>`;
        html += `<div style='text-align:center; border-bottom:3px solid #8b0000; padding-bottom:10px; margin-bottom:20px;'>`;
        html += `<h2 style='color:#8b0000;'>Mubarak Al-Kabeer Hospital</h2><h3>Heart Failure Clinic Registry</h3></div>`;
        html += `<h3>Patient: ${escapeHtml(data.Patient_Name||'Unknown')} | File: ${data.File_No||'N/A'}</h3>`;
        // Simplified sections – can be expanded
        html += `<table style='width:100%; border-collapse:collapse;'>`;
        for (const [key, val] of Object.entries(data)) {
            if (key !== 'timestamp' && key !== 'Patient_Name_lower')
                html += `<tr><td style='padding:4px; border-bottom:1px solid #ddd;'><strong>${key}</strong></td><td>${escapeHtml(String(val))}</td></tr>`;
        }
        html += `</table>`;
        if (visits.length) {
            html += `<div style='page-break-before:always;'></div><h3>Visits</h3>`;
            visits.forEach((v, idx) => {
                html += `<div style='border:1px solid #ccc; margin:15px 0; padding:10px;'><h4>Visit ${idx+1}: ${v.visitDate} (${v.visitType})</h4>`;
                for (const [k, val] of Object.entries(v)) {
                    if (val && k !== 'timestamp')
                        html += `<p><strong>${k}</strong>: ${escapeHtml(String(val))}</p>`;
                }
                html += `</div>`;
            });
        }
        html += `<div style='margin-top:30px; text-align:center; font-size:11px;'>Generated: ${new Date().toLocaleString()}</div></div>`;
        container.innerHTML = html;
        const element = document.getElementById('pdfContent');
        setTimeout(() => {
            html2pdf().from(element).set({ margin: 0.4, filename: `HF_Report_${data.File_No||'unknown'}.pdf`, html2canvas: { scale: 2 } }).save().then(() => {
                container.innerHTML = '';
                container.classList.remove('active');
            });
        }, 500);
    },

    exportPatientExcel: async function(id) {
        const data = this.patientDataCache[id];
        if (!data) { this.showPopup("error","Error","Patient data not found"); return; }
        const snap = await db.collection("patients").doc(id).collection("visits").orderBy("visitDate","desc").get();
        const visits = []; snap.forEach(d => visits.push(d.data()));
        const wb = XLSX.utils.book_new();
        const wsData = [["Patient Data"]];
        for (const [k,v] of Object.entries(data)) wsData.push([k, v]);
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        XLSX.utils.book_append_sheet(wb, ws, "Patient");
        if (visits.length) {
            const visitRows = [["Visit Date","Type","Details"]];
            visits.forEach(v => {
                const details = Object.entries(v).map(([k,val]) => `${k}:${val}`).join(", ");
                visitRows.push([v.visitDate, v.visitType, details]);
            });
            const ws2 = XLSX.utils.aoa_to_sheet(visitRows);
            XLSX.utils.book_append_sheet(wb, ws2, "Visits");
        }
        XLSX.writeFile(wb, `HF_${data.File_No||'patient'}.xlsx`);
        this.showPopup("success","Excel Exported","File downloaded.");
    },

};

// Helper to escape HTML
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
